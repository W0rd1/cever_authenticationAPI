spring:
  application:
    name: CeverManager
  datasource:
    url: jdbc:postgresql://localhost:6000/cever
    username: cever
    password: ceverdb
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cors:
    origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"
    methods: "${CORS_ALLOWED_METHODS:GET,POST,DELETE,PUT,PATCH}"